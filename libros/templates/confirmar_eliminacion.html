{% extends 'base.html' %}

{% block content %}
<h2>Confirmar eliminación</h2>

<p>¿Estás seguro que deseas eliminar el libro "<strong>{{ libro.titulo }}</strong>"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
</form>

<a href="{% url 'listar_libros' %}">Cancelar</a>
{% endblock %}
