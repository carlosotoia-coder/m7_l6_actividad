{% extends 'base.html' %}

{% block content %}
<h2>Listado de Libros</h2>

<ul>
    {% for libro in libros %}
        <li>
            <strong>{{ libro.titulo }}</strong> - {{ libro.autor }}
            |
            <a href="{% url 'editar_libro' libro.id %}">Editar</a>
            |
            <a href="{% url 'eliminar_libro' libro.id %}">Eliminar</a>
        </li>
    {% empty %}
        <li>No hay libros registrados.</li>
    {% endfor %}
</ul>

{% endblock %}
